# Task-Star 用户配置文件
# 复制自 default_config.yaml，请根据实际情况修改

general:
  # 问卷链接（必填）
  questionnaire_url: "https://www.wjx.cn/jq/12345678.aspx"
  
  # 填写次数（必填）
  fill_times: 5
  
  # 是否自动提交 (true: 提交; false: 仅填写不提交，用于调试)
  auto_submit: true
  
  # 两次提交之间的等待时间（秒），建议设置 3-10 秒，避免被封禁
  interval_seconds: 5
  
  # 浏览器运行模式 (true: 后台运行; false: 显示浏览器窗口)
  headless: false
  
  # 失败重试次数
  retry_count: 3
  
  # 页面加载超时时间（秒）
  page_timeout: 30
  
  # 代理服务器（可选，格式: host:port）
  # proxy: "127.0.0.1:7890"

# 答题策略配置
strategy:
  # 单选题策略：目前仅支持 "random" (随机选择一个选项)
  single_choice: "random"
  
  # 多选题策略
  multi_choice:
    # 最少选择项数
    min_select: 2
    # 最多选择项数 (设为 -1 表示不限制，即选择所有选项)
    max_select: 3
  
  # 填空题策略：按题号配置答案池
  # 程序会从列表中随机选择一个答案填入
  # 键为题号（从 1 开始），值为答案列表
  fill_blanks:
    1: ["张三", "李四", "王五"]
    2: ["计算机科学与技术", "软件工程", "人工智能"]
